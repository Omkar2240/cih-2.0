<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Electronic Gadgets</title>
  <desc id="desc">Stylized laptop stand and pendrive illustration</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b2ff"/>
      <stop offset="100%" stop-color="#0070f3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="36" fill="url(#bg)"/>
  <g opacity="0.25">
    <circle cx="240" cy="180" r="130" fill="#0070f3"/>
    <circle cx="980" cy="620" r="160" fill="#fadb5f"/>
  </g>
  <g transform="translate(130 230)">
    <rect x="0" y="0" width="620" height="30" rx="15" fill="#2d3a4d"/>
    <path d="M20 30 L600 30 L530 180 L90 180 Z" fill="#1a2230"/>
    <rect x="70" y="75" width="480" height="20" rx="10" fill="url(#cyan)" opacity="0.7"/>
    <text x="22" y="-18" fill="#cde6ff" font-family="Arial, sans-serif" font-size="36" font-weight="700">Laptop Stand</text>
  </g>
  <g transform="translate(790 250)">
    <rect x="0" y="30" width="250" height="180" rx="32" fill="#1b2333" stroke="#4b5870" stroke-width="6"/>
    <rect x="18" y="54" width="122" height="132" rx="18" fill="#0f1622"/>
    <rect x="150" y="72" width="78" height="96" rx="14" fill="url(#cyan)"/>
    <rect x="228" y="88" width="40" height="64" rx="8" fill="#bcc7da"/>
    <text x="0" y="-20" fill="#cde6ff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Pendrive</text>
  </g>
</svg>
